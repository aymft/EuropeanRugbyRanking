name: Reset weekly ranking snapshot

on:
  schedule:
    - cron: "15 0 * * 3"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: reset-ranking-snapshot
  cancel-in-progress: false

jobs:
  reset-ranking-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Reset weekly snapshot
        run: python -m src.reset_weekly_snapshot

      - name: Regenerate rankings with reset deltas
        run: python -m src.generate_rankings

      - name: Commit reset if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain)" ]]; then
            git add data/processed/previous_rankings.json
            git add data/processed/rankings.csv
            git add docs/data/rankings.csv
            git add docs/data/rankings.json
            git commit -m "Reset weekly ranking comparison"
            git push
          else
            echo "No weekly reset changes to commit."
          fi